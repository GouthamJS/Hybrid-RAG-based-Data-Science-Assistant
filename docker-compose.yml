version: '3.8'

services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./vectorstore/faiss_index:/app/vectorstore/faiss_index

  streamlit:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - fastapi
    volumes:
      - ./vectorstore/faiss_index:/app/vectorstore/faiss_index
